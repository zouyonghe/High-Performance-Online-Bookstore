host: 127.0.0.1:8081
info:
  contact:
    email: 1259085392z@gmail.com
    name: API Support
    url: https://github.com/zouyonghe
  description: The jinshuzhai bookstore api server.
  license:
    name: GPLv3
    url: https://www.gnu.org/licenses/gpl-3.0.html
  termsOfService: https://github.com/zouyonghe
  title: High-Performance-Online-Bookstore
  version: 0.7.0
paths:
  /book:
    get:
      description: List books by fuzzy title and exact category with pagination
      parameters:
      - description: fuzzy book title
        in: query
        name: title
        type: string
      - description: exact book category
        in: query
        name: category
        type: string
      - description: page number, default 1
        in: query
        name: pageNum
        type: integer
      - description: page size, default 10
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/book.SwaggerListResponse'
      summary: List books
      tags:
      - book
    post:
      consumes:
      - application/json
      description: Add a new book (seller or admin only)
      parameters:
      - description: book information
        in: body
        name: book
        required: true
        schema:
          $ref: '#/definitions/book.AddRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/book.SwaggerAddResponse'
      security:
      - ApiKeyAuth: []
      summary: Add a new book
      tags:
      - book
  /book/{id}:
    delete:
      description: Delete a book specified by book ID (seller or admin only)
      parameters:
      - description: the ID of the book
        format: int64
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/book.SwaggerDeleteResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete a book
      tags:
      - book
    get:
      description: Get a book specified by book ID
      parameters:
      - description: the ID of the book
        format: int64
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/book.SwaggerGetResponse'
      summary: Get a book
      tags:
      - book
    put:
      consumes:
      - application/json
      description: Update a book specified by book ID (seller or admin only)
      parameters:
      - description: the ID of the book
        format: int64
        in: path
        name: id
        required: true
        type: integer
      - description: book information
        in: body
        name: book
        required: true
        schema:
          $ref: '#/definitions/book.AddRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/book.SwaggerUpdateResponse'
      security:
      - ApiKeyAuth: []
      summary: Update a book
      tags:
      - book
  /cart:
    delete:
      consumes:
      - application/json
      description: Remove the specified number of a book from the current user's cart
      parameters:
      - description: book ID and number
        in: body
        name: book
        required: true
        schema:
          $ref: '#/definitions/cart.DeleteCartRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cart.SwaggerDeleteCartResponse'
      security:
      - ApiKeyAuth: []
      summary: Remove books from the cart
      tags:
      - cart
    get:
      description: Show the books and total price of the current user's cart
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cart.SwaggerShowCartResponse'
      security:
      - ApiKeyAuth: []
      summary: Show the cart
      tags:
      - cart
    put:
      consumes:
      - application/json
      description: Add a book to the current user's cart
      parameters:
      - description: book ID and number
        in: body
        name: book
        required: true
        schema:
          $ref: '#/definitions/cart.AddCartRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cart.SwaggerAddCartResponse'
      security:
      - ApiKeyAuth: []
      summary: Add a book to the cart
      tags:
      - cart
  /cart/all:
    delete:
      description: Remove all books from the current user's cart
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cart.SwaggerClearCartResponse'
      security:
      - ApiKeyAuth: []
      summary: Clear the cart
      tags:
      - cart
  /order:
    get:
      description: 'List orders: general users see their own orders, sellers and admins
        see all accepted orders'
      parameters:
      - description: page number, default 1
        in: query
        name: pageNum
        type: integer
      - description: page size, default 10
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/order.SwaggerListResponse'
      security:
      - ApiKeyAuth: []
      summary: List orders
      tags:
      - order
    post:
      description: Create an order from all books in the current user's cart and clear
        the cart
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/order.SwaggerCreateOrderResponse'
      security:
      - ApiKeyAuth: []
      summary: Create an order
      tags:
      - order
    put:
      consumes:
      - application/json
      description: 'Deal with an order: operation=accept pays the order, operation=cancel
        cancels the order'
      parameters:
      - description: order ID and operation
        in: body
        name: order
        required: true
        schema:
          $ref: '#/definitions/order.DealOrderRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/order.SwaggerDealOrderResponse'
      security:
      - ApiKeyAuth: []
      summary: Deal with an order
      tags:
      - order
  /state/cpu:
    get:
      description: Check the cpu load of the server
      produces:
      - text/plain
      responses:
        "200":
          description: 'OK - Load average: ...'
          schema:
            type: string
      summary: CPU check
      tags:
      - state
  /state/disk:
    get:
      description: Check the disk usage of the server
      produces:
      - text/plain
      responses:
        "200":
          description: 'OK - Free space: ...'
          schema:
            type: string
      summary: Disk check
      tags:
      - state
  /state/health:
    get:
      description: Show OK as the ping-pong result
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Health check
      tags:
      - state
  /state/ram:
    get:
      description: Check the ram usage of the server
      produces:
      - text/plain
      responses:
        "200":
          description: 'OK - Free space: ...'
          schema:
            type: string
      summary: RAM check
      tags:
      - state
  /user/admin:
    get:
      description: List users account by specified username format include id, username,
        role, etc. The password hash is never returned.
      parameters:
      - description: fuzzy username
        in: query
        name: username
        type: string
      - description: page number, default 1
        in: query
        name: pageNum
        type: integer
      - description: page size, default 10
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":0,"message":"OK","data":{"totalCount":1,"userList":[{"id":1,"username":"admin","ShortId":"5P9Ia4QnR","role":"admin","createdAt":"2021-04-18
            15:40:33","updatedAt":"2021-04-18 15:40:33"}]}}'
          schema:
            $ref: '#/definitions/user.SwaggerListResponse'
      security:
      - ApiKeyAuth: []
      summary: List users account by specified username format.
      tags:
      - user/admin
  /user/admin/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a user by user ID
      parameters:
      - description: the ID of the specified user to delete
        format: int64
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":0,"message":"OK","data":{"UserID":5}}'
          schema:
            $ref: '#/definitions/user.SwaggerDeleteResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete a user
      tags:
      - user/admin
    get:
      description: Get a user account specified by user ID
      parameters:
      - description: the ID of the specified user to update
        format: int64
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":0,"message":"OK","data":{"UserID":5,"username":"傅秀英","role":"general"}}'
          schema:
            $ref: '#/definitions/user.SwaggerGetResponse'
      security:
      - ApiKeyAuth: []
      summary: Get a user information
      tags:
      - user/admin
    put:
      consumes:
      - application/json
      description: Update a user account specified by user ID
      parameters:
      - description: the ID of the specified user to update
        format: int64
        in: path
        name: id
        required: true
        type: integer
      - description: user information include username and password
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/user.UpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":0,"message":"OK","data":{"UserID":5}}'
          schema:
            $ref: '#/definitions/user.SwaggerUpdateResponse'
      security:
      - ApiKeyAuth: []
      summary: Update a user account
      tags:
      - user/admin
  /user/common:
    get:
      description: Get the information of the user specified by the token. The password
        hash is never returned.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.SwaggerGetResponse'
      security:
      - ApiKeyAuth: []
      summary: Get self user information
      tags:
      - user/common
    put:
      consumes:
      - application/json
      description: Update the current user information by username and password
      parameters:
      - description: Create a new user
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/user.SelfUpdRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":0,"message":"OK","data":{"UserID":6,"username":"夏秀兰"}}'
          schema:
            $ref: '#/definitions/user.SwaggerSelfUpdResponse'
      security:
      - ApiKeyAuth: []
      summary: Update the current user information
      tags:
      - user/common
  /user/common/:
    delete:
      description: SelfDel deletes the user of token specified
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":0,"message":"OK","data":{"UserID":8}}'
          schema:
            $ref: '#/definitions/user.SwaggerSelfDelResponse'
      security:
      - ApiKeyAuth: []
      summary: SelfDel deletes the user of token specified
      tags:
      - user/common
  /user/login:
    post:
      consumes:
      - application/json
      description: Login a user account with username and password
      parameters:
      - description: Login account
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/user.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":0,"message":"OK","data":{"UserID":7,"token":"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpYXQiOjE2NTA0NTkzODEsImlkIjo3LCJuYmYiOjE2NTA0NTkzODEsInJvbGUiOiJnZW5lcmFsIiwidXNlcm5hbWUiOiLkuIHno4oifQ.0kA4whaE9bZjXu4bN3Sw0DgrKwYzJ7kZenaGDOcdFRQ"}}'
          schema:
            $ref: '#/definitions/user.SwaggerLoginResponse'
      summary: Login  a user account
      tags:
      - user
  /user/register:
    post:
      consumes:
      - application/json
      description: Register a new user by username and password
      parameters:
      - description: user information include username and password
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/user.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":0,"message":"OK","data":{"UserID":12,"username":"汤桂英","role":"business"}}'
          schema:
            $ref: '#/definitions/user.SwaggerRegisterResponse'
      summary: Register a new user
      tags:
      - user
schemes:
- http
- https
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
